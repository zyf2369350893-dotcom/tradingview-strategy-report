name: TradingView Strategy Email Report

on:
  schedule:
    # Beijing 09:10 daily: 70-minute buffer after the UTC crypto daily close
    - cron: '10 1 * * *'
    # Beijing 09:25 Monday: completed equity and UTC crypto weeks
    - cron: '25 1 * * 1'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report type to send'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - diagnostic
      dry_run:
        description: 'Print report without sending email'
        required: true
        default: false
        type: boolean

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide report type
        id: report
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ inputs.report_type }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "25 1 * * 1" ]]; then
            echo "type=weekly" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "type=daily" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send strategy report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TLS: ${{ secrets.SMTP_TLS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          args=(--report-type "${{ steps.report.outputs.type }}")
          if [[ "${{ steps.report.outputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          python hermes-skills/tradingview-market-scan/scripts/send_strategy_report.py "${args[@]}"
